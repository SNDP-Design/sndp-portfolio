<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Sandeep Rathi — Product Designer</title>
    <meta name="description" content="Page not found on Sandeep Rathi's Product Design portfolio.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" href="https://www.sndpdesign.uno/favicon.png?v=2">
    <link rel="apple-touch-icon" href="https://www.sndpdesign.uno/apple-touch-icon.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0a0a0c;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 580px;
            width: 100%;
            text-align: center;
            background: rgba(18, 18, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 48px 36px;
            border-radius: 28px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
        }
        .code-404 {
            font-size: 96px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -3px;
            background: linear-gradient(180deg, #ffffff 0%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffffff;
        }
        p {
            color: #a0a0a0;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 36px;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 22px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .btn-primary {
            background: #ffffff;
            color: #000000;
            border: 1px solid #ffffff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.16);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="code-404">404</div>
        <h1>Page Not Found</h1>
        <p>The page you are looking for might have been moved, renamed, or doesn't exist.</p>
        <div class="actions">
            <a href="/" class="btn btn-primary">🏠 Back Home</a>
            <button onclick="if(window.openCmdKSearch) window.openCmdKSearch();" class="btn btn-secondary">🔍 Search (Cmd + K)</button>
            <a href="https://calendly.com/sndp-design/30min" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">📅 Book a Call ↗</a>
        </div>
    </div>

    <script src="/cmd_k_search.js"></script>
    <script src="/portfolio_enhancements.js"></script>
</body>
</html>
